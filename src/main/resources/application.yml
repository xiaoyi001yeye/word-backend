spring:
  application:
    name: words

  output:
    ansi:
      enabled: always

  datasource:
    url: jdbc:postgresql://localhost:5432/words?serverTimezone=Asia/Shanghai
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Shanghai

  sql:
    init:
      mode: never

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB


server:
  port: 8080

logging:
  level:
    root: INFO
    com.example.words: INFO
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
    org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping: WARN
    org.springframework.web.servlet.handler.SimpleUrlHandlerMapping: WARN
  file:
    name: logs/app.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 7

security:
  jwt:
    secret: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
    expiration-hours: 24

ai:
  config:
    encryption-key: ${AI_CONFIG_ENCRYPTION_KEY:}
  http:
    connect-timeout-ms: 3000
    read-timeout-ms: 30000

video:
  storage:
    config:
      encryption-key: ${VIDEO_STORAGE_CONFIG_ENCRYPTION_KEY:}
