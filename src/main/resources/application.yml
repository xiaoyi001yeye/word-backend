spring:
  application:
    name: words

  output:
    ansi:
      enabled: always

  datasource:
    url: jdbc:postgresql://localhost:5432/words?serverTimezone=Asia/Shanghai
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Shanghai

  sql:
    init:
      mode: always
      schema-locations: classpath:db/migration/V1__init_word_vocabulary.sql,classpath:db/migration/V2__create_dictionary_tables.sql,classpath:db/migration/V3__add_dictionary_creation_type.sql,classpath:db/migration/V4__add_jsonb_fields_to_meta_words.sql,classpath:db/migration/V5__migrate_data_to_jsonb.sql,classpath:db/migration/V7__ensure_dictionary_words_unique_constraint.sql,classpath:db/migration/V7__create_exam_tables.sql,classpath:db/migration/V8__add_selected_option_to_exam_questions.sql,classpath:db/migration/V9__add_user_role_support.sql,classpath:db/migration/V10__add_classroom_support.sql,classpath:db/migration/V11__add_famous_quotes.sql,classpath:db/migration/V13__add_famous_quote_translations.sql,classpath:db/migration/V14__add_study_plan_support.sql,classpath:db/migration/V15__deduplicate_study_plan_data_and_add_constraints.sql
      continue-on-error: true


server:
  port: 8080

logging:
  level:
    root: INFO
    com.example.words: INFO
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
    org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping: WARN
    org.springframework.web.servlet.handler.SimpleUrlHandlerMapping: WARN
  file:
    name: logs/app.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 7

security:
  jwt:
    secret: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
    expiration-hours: 24
